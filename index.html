<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GTİP Arama — Türkiye Gümrük Tarife Cetveli</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--sf:#181c27;--sf2:#1e2333;--bd:#2a3047;--bd2:#3a4560;--ac:#4f8ef7;--ac2:#7cb3ff;--tx:#e8ecf4;--tx2:#8b96b0;--tx3:#5a6480;--gn:#3ecf8e;--wn:#f7a84f;--mn:'IBM Plex Mono',monospace;--ss:'IBM Plex Sans',sans-serif}
body{font-family:var(--ss);background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:48px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.logo{font-family:var(--mn);font-size:11px;letter-spacing:.1em;color:var(--ac2);display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-r{font-size:9px;color:var(--tx3);font-family:var(--mn)}
.layout{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden}
.left{border-right:1px solid var(--bd);display:flex;flex-direction:column;background:var(--sf);overflow:hidden}
.right{overflow-y:auto;background:var(--bg)}
.right::-webkit-scrollbar{width:3px}
.right::-webkit-scrollbar-thumb{background:var(--bd2)}
.sw{padding:.6rem;border-bottom:1px solid var(--bd)}
.siw{position:relative}
.si{width:100%;background:var(--bg);border:1px solid var(--bd2);border-radius:7px;padding:8px 30px 8px 11px;font-family:var(--mn);font-size:12px;color:var(--tx);outline:none;transition:border-color .15s}
.si:focus{border-color:var(--ac)}
.si::placeholder{color:var(--tx3)}
.sicl{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;display:none;line-height:1}
.sicl.show{display:block}
.sh{font-size:9px;color:var(--tx3);margin-top:4px;font-family:var(--mn)}
.tabs{display:flex;border-bottom:1px solid var(--bd)}
.tb{flex:1;padding:8px;font-size:9px;font-family:var(--mn);letter-spacing:.05em;background:none;border:none;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase}
.tb.active{color:var(--ac2);border-bottom-color:var(--ac)}
.lb{flex:1;overflow-y:auto;padding:.4rem}
.lb::-webkit-scrollbar{width:3px}
.lb::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.ri{padding:8px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .12s}
.ri:hover{background:var(--sf2);border-color:var(--bd)}
.ri.sel{background:rgba(79,142,247,.1);border-color:var(--ac)}
.ric{font-family:var(--mn);font-size:10px;color:var(--ac);margin-bottom:2px}
.rin{font-size:11px;color:var(--tx);line-height:1.4}
.ris{font-size:9px;color:var(--tx3);margin-top:1px}
.bi{margin-bottom:2px}
.bh{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;cursor:pointer;border-radius:5px;transition:background .12s}
.bh:hover{background:var(--sf2)}
.bn{font-family:var(--mn);color:var(--ac);font-size:9px;min-width:18px;font-weight:600;flex-shrink:0}
.bname{flex:1;font-size:10px;color:var(--tx2);line-height:1.4}
.btog{color:var(--tx3);font-size:8px;transition:transform .2s;flex-shrink:0;pointer-events:none;margin-top:1px}
.btog.open{transform:rotate(90deg)}
.fl{padding-left:14px;display:none}
.fl.open{display:block}
.fi{padding:5px 8px;cursor:pointer;border-radius:5px;font-size:10px;color:var(--tx3);display:flex;gap:6px;align-items:baseline;transition:all .12s;margin-bottom:1px}
.fi:hover{background:var(--sf2);color:var(--tx2)}
.fno{font-family:var(--mn);color:var(--ac);font-size:9px;min-width:22px;flex-shrink:0}
.qw{padding:.6rem;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.qs{font-size:9px;color:var(--tx3);font-family:var(--mn);margin-bottom:4px}
.qr{display:flex;gap:5px}
.qi{flex:1;background:var(--bg);border:1px solid var(--bd2);border-radius:6px;padding:7px 10px;font-family:var(--ss);font-size:11px;color:var(--tx);outline:none;transition:border-color .2s}
.qi:focus{border-color:var(--ac)}
.qi::placeholder{color:var(--tx3)}
.qb{padding:7px 12px;background:var(--ac);border:none;border-radius:6px;color:#fff;font-family:var(--mn);font-size:10px;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.qb:hover{opacity:.85}
.qb:disabled{opacity:.4;cursor:not-allowed}
.wc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:2rem;text-align:center}
.wi{font-size:40px;opacity:.2}
.wt{font-size:17px;font-weight:500;color:var(--tx2)}
.ws{font-size:11px;color:var(--tx3);line-height:1.7;max-width:280px}
.qe{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:4px}
.ec{padding:4px 10px;border:1px solid var(--bd2);border-radius:20px;font-family:var(--mn);font-size:9px;color:var(--tx2);cursor:pointer;transition:all .12s;background:var(--sf)}
.ec:hover{border-color:var(--ac);color:var(--ac2)}
.det{padding:1.25rem;max-width:820px}
.dc{font-family:var(--mn);font-size:9px;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.dt{font-size:17px;font-weight:500;color:var(--tx);line-height:1.3;margin-bottom:8px}
.bc{display:flex;align-items:center;gap:4px;font-size:9px;font-family:var(--mn);color:var(--tx3);flex-wrap:wrap;margin-bottom:1.25rem}
.bcs{color:var(--bd2)}
.bcc{color:var(--ac2)}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.sb{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px}
.sbl{font-size:8px;color:var(--tx3);font-family:var(--mn);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.sbv{font-size:13px;font-family:var(--mn);color:var(--tx);font-weight:500}
.sbv.code{color:var(--ac2);font-size:15px;letter-spacing:.04em}
.sec{margin-bottom:1.5rem}
.sl{font-family:var(--mn);font-size:8px;letter-spacing:.15em;color:var(--tx3);text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.db{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:14px;line-height:1.8;font-size:12px;color:var(--tx2)}
.sg{display:grid;gap:4px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;cursor:pointer;display:flex;align-items:baseline;gap:9px;transition:all .12s}
.sc:hover{border-color:var(--bd2);background:var(--sf2)}
.scc{font-family:var(--mn);font-size:10px;color:var(--ac);min-width:110px;flex-shrink:0}
.scn{font-size:11px;color:var(--tx2);line-height:1.4}
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.vcard{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px}
.vcl{font-size:8px;color:var(--tx3);font-family:var(--mn);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.vcv{font-size:14px;font-family:var(--mn);color:var(--tx);font-weight:500}
.vcv.g{color:var(--gn)}
.ekv{font-size:10px;color:var(--wn);background:rgba(247,168,79,.08);border:1px solid rgba(247,168,79,.2);border-radius:6px;padding:8px 12px;margin-top:6px;line-height:1.6}
.utbl{display:grid;gap:2px}
.urow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.urow:last-child{border:none}
.urn{width:18px;text-align:center;font-family:var(--mn);font-size:9px;color:var(--tx3);flex-shrink:0}
.uan{flex:2;color:var(--tx)}
.ubw{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.ub{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--ac),var(--ac2))}
.up{width:32px;text-align:right;font-family:var(--mn);font-size:10px;color:var(--ac2);flex-shrink:0}
.cnt{font-family:var(--mn);font-size:9px;color:var(--tx3);padding:.25rem .5rem .4rem;text-align:right}
.emp{padding:2rem 1rem;text-align:center;color:var(--tx3);font-size:10px;font-family:var(--mn);line-height:2.2}
.ldr{display:flex;align-items:center;gap:10px;padding:1.5rem 0}
.ldb{width:100px;height:2px;background:var(--bd);border-radius:1px;overflow:hidden}
.ldbi{height:100%;background:var(--ac);animation:ld 1.5s ease-in-out infinite}
@keyframes ld{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
.lt{font-family:var(--mn);font-size:10px;color:var(--tx3)}
.qres{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;line-height:1.9;font-size:12px;color:var(--tx2);white-space:pre-wrap}
.er{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:14px;font-size:11px;color:#f87171;line-height:1.7}
.ib{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.15);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--tx2);line-height:1.7}
.splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.splash-logo{font-family:var(--mn);font-size:14px;letter-spacing:.15em;color:var(--ac2)}
.splash-bar{width:200px;height:2px;background:var(--bd);border-radius:1px;overflow:hidden}
.splash-fill{height:100%;background:var(--ac);border-radius:1px;transition:width .3s ease}
.splash-txt{font-family:var(--mn);font-size:10px;color:var(--tx3)}
.atbl{display:grid;gap:2px}
.arow{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:11px}
.arow:last-child{border:none}
.arn{width:18px;text-align:center;font-family:var(--mn);font-size:9px;color:var(--tx3);flex-shrink:0;margin-top:1px}
.afu{flex:2;color:var(--tx);font-weight:500}
.aul{flex:1;color:var(--tx3);font-size:10px}
.ask{flex:1;color:var(--ac2);font-size:10px}
.aac{flex:2;color:var(--tx3);font-size:10px;line-height:1.4;font-style:italic}
.uhack{width:60px;text-align:right;font-family:var(--mn);font-size:10px;color:var(--gn);flex-shrink:0}
.ugmrk{width:80px;text-align:right;font-family:var(--mn);font-size:10px;color:var(--wn,#f7a84f);flex-shrink:0}
.utbl-hdr{display:flex;gap:8px;font-size:8px;color:var(--tx3);font-family:var(--mn);letter-spacing:.08em;text-transform:uppercase;padding:0 0 5px;border-bottom:1px solid var(--bd);margin-bottom:3px}
@media(max-width:700px){.layout{grid-template-columns:1fr}.left{height:50vh;border-right:none;border-bottom:1px solid var(--bd)}.sr,.vgrid{grid-template-columns:1fr 1fr}.hdr-r{display:none}}
</style>
</head>

sileri","66":"Şemsiyeler","67":"İşlenmiş Tüyler; Yapma Çiçekler","68":"Taş, Alçı, Çimento Eşyası","69":"Seramik Ürünler","70":"Cam Ve Cam Eşyası","71":"Değerli Taşlar Ve Metaller","72":"Demir Ve Çelik","73":"Demir Ve Çelikten Eşya","74":"Bakır Ve Bakırdan Eşya","75":"Nikel Ve Nikelden Eşya","76":"Alüminyum Ve Alüminyumdan Eşya","78":"Kurşun Ve Kurşundan Eşya","79":"Çinko Ve Çinkodan Eşya","80":"Kalay Ve Kalaydan Eşya","81":"Diğer Adi Metaller","82":"Adi Metalden Aletler","83":"Çeşitli Adi Metal Eşyası","84":"Nükleer Reaktörler, Kazanlar, Makineler","85":"Elektrikli Makine Ve Cihazlar","86":"Demiryolu Lokomotifleri","87":"Kara Taşıtları Ve Traktörler","88":"Hava Taşıtları, Uzay Araçları","89":"Gemiler Ve Suda Yüzen Taşıtlar","90":"Optik, Fotoğraf, Tıbbi Aletler","91":"Saatler","92":"Müzik Aletleri","93":"Silahlar Ve Mühimmat","94":"Mobilya; Aydınlatma","95":"Oyuncaklar Ve Spor Malzemeleri","96":"Çeşitli Mamul Eşya","97":"Sanat Eserleri Ve Antikalar"};
const BOLUMLER=[

  {id:17,ad:"TAŞITLAR, UÇAKLAR, GEMİLER",f:["86","87","88","89"]},
  {id:18,ad:"OPTİK, TIBBİ ALETLER, SAATLER",f:["90","91","92"]},
  {id:19,ad:"SİLAHLAR VE MÜHİMMAT",f:["93"]},

  {id:21,ad:"SANAT ESERLERİ VE ANTİKALAR",f:["97"]}
];
const EXAMPLES=[["8703","Binek Araç"],["2709","Ham Petrol"],["8471","Bilgisayar"],["8517","Telefon"],["6101","Giyim"],["7207","Çelik"],["pamuk","Pamuk"],["makarna","Makarna"],["ilaç","İlaç"],["alüminyum","Alüminyum"],["traktör","Traktör"],["zeytinyağ","Zeytinyağı"]];

let DATA=[], CACHE={}, curTab="s", curSel=null, busyQ=false, sTimer=null;

function norm(s){return String(s).toLowerCase().replace(/[ğĞ]/g,"g").replace(/[üÜ]/g,"u").replace(/[şŞ]/g,"s").replace(/[ıİI]/g,"i").replace(/[öÖ]/g,"o").replace(/[çÇ]/g,"c")}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtCode(c){
  if(c.length===12)return c.slice(0,4)+"."+c.slice(4,6)+"."+c.slice(6,8)+"."+c.slice(8,10)+"."+c.slice(10,12);
  if(c.length===4) return c.slice(0,2)+"."+c.slice(2,4);
  return c;
}
function ldg(txt){return '<div class="ldr"><div class="ldb"><div class="ldbi"></div></div><span class="lt">'+escH(txt)+'</span></div>'}
function fa(fn){return FASIL_ADLARI[fn]||("Fasıl "+fn)}

// ── VERİ YÜKLEME ──────────────────────────────────────────
async function loadData(){
  setSplash(10,"Veri indiriliyor...");
  try{
    const r=await fetch("./gtip_data.json");
    setSplash(60,"Ayrıştırılıyor...");
    const raw=await r.json();
    setSplash(85,"Hazırlanıyor...");
    DATA=[];
    for(const rec of raw){
      const [c,d,f]=rec;
      if(/^\d{12}$/.test(c)) DATA.push(rec);
      else if(/^\d{2}\.\d{2}$/.test(c)) DATA.push([c.replace(".",""),d,f]);
    }
    setSplash(100,"Hazır!");
    setTimeout(hideSplash,400);
    ready();
  }catch(e){
    document.getElementById("stxt").textContent="Hata: "+e.message;
  }
}
function setSplash(pct,txt){
  document.getElementById("sfill").style.width=pct+"%";
  document.getElementById("stxt").textContent=txt;
}
function hideSplash(){
  const s=document.getElementById("splash");
  s.style.transition="opacity .4s";s.style.opacity="0";
  setTimeout(()=>s.remove(),400);
}
function ready(){
  document.getElementById("sh").textContent=DATA.length.toLocaleString("tr")+" kayıt \u00b7 Ctrl+K";
  document.getElementById("lb").innerHTML='<div class="emp">GTİP kodu veya ürün adı yazın<br>ya da Bölümler sekmesine bakın</div>';
  document.getElementById("qe").innerHTML=EXAMPLES.map(e=>'<span class="ec" onclick="srchEx(\''+escH(e[0])+'\')">'+e[0]+" "+escH(e[1])+"</span>").join("");
}

// ── ARAMA ─────────────────────────────────────────────────
function onSrch(v){
  document.getElementById("sicl").className=v?"sicl show":"sicl";
  clearTimeout(sTimer);
  if(!v.trim()){document.getElementById("lb").innerHTML='<div class="emp">GTİP kodu veya ürün adı yazın</div>';document.getElementById("sh").textContent=DATA.length.toLocaleString("tr")+" kayıt \u00b7 Ctrl+K";return;}
  sTimer=setTimeout(()=>doSrch(v.trim()),180);
}
function doSrch(q){
  const isCode=/^\d/.test(q);
  const qn=norm(q);
  let res;
  if(isCode){
    const qc=q.replace(/[\.\s\-]/g,"");
    res=DATA.filter(r=>{const c=r[0];if(c.length<=4)return c.startsWith(qc.slice(0,4));return c.startsWith(qc);});
  }else{
    res=DATA.filter(r=>norm(r[1]).includes(qn));
  }
  document.getElementById("sh").textContent=res.length+" sonuç bulundu";
  if(!res.length){document.getElementById("lb").innerHTML='<div class="emp">Sonuç bulunamadı.<br>Farklı kelime deneyin.</div>';return;}
  const top=res.slice(0,100);
  document.getElementById("lb").innerHTML=
    (res.length>100?'<div class="cnt">İlk 100 / '+res.length+' toplam</div>':"")+
    top.map(r=>riHTML(r)).join("");
}
function riHTML(r){
  const sel=curSel===r[0]?" sel":"";
  const f=fa(r[2]);
  return '<div class="ri'+sel+'" onclick="selCode(\''+escH(r[0])+'\',\''+escH(r[1]).replace(/\'/g,"&#39;")+'\',\''+r[2]+'\')">'+
    '<div class="ric">'+fmtCode(r[0])+'</div>'+
    '<div class="rin">'+escH(r[1])+'</div>'+
    '<div class="ris">Fasıl '+r[2]+' \u2014 '+escH(f.length>48?f.slice(0,48)+"...":f)+'</div></div>';
}

// ── DETAY ─────────────────────────────────────────────────
function selCode(code,desc,fasil){
  curSel=code;
  document.querySelectorAll(".ri").forEach(el=>el.classList.toggle("sel",el.querySelector(".ric")?.textContent===fmtCode(code)));
  showDet(code,desc,fasil);
}
async function showDet(code,desc,fasil){
  const fc=fmtCode(code);
  const f=fa(fasil);
  const bol=BOLUMLER.find(b=>b.f.includes(fasil));
  const ba=bol?"Bölüm "+bol.id+" \u2014 "+bol.ad:"";
  const pos=code.slice(0,4);
  let subs=[];
  if(code.length===4) subs=DATA.filter(r=>r[0].length===12&&r[0].startsWith(pos)&&r[2]===fasil).slice(0,40);
  else subs=DATA.filter(r=>r[0].length===12&&r[0].startsWith(pos)&&r[0]!==code&&r[2]===fasil).slice(0,20);
  const subLabel=code.length===4?"12 Haneli Alt Kodlar":"Aynı Pozisyondaki Diğer Kodlar";
  const subH=subs.length?
    '<div class="sec"><div class="sl">'+subLabel+' ('+subs.length+')</div><div class="sg">'+
    subs.map(r=>'<div class="sc" onclick="selCode(\''+escH(r[0])+'\',\''+escH(r[1]).replace(/\'/g,"&#39;")+'\',\''+r[2]+'\')"><span class="scc">'+fmtCode(r[0])+'</span><span class="scn">'+escH(r[1])+'</span></div>').join("")+
    '</div></div>':"";

  const xid="x"+code;
  document.getElementById("rp").innerHTML=
    '<div class="det">'+
    '<div class="dc">GTİP DETAY</div>'+
    '<div class="dt">'+escH(desc)+'</div>'+
    '<div class="bc"><span>'+escH(ba.length>55?ba.slice(0,55)+"...":ba)+'</span><span class="bcs"> › </span><span>Fasıl '+fasil+'</span><span class="bcs"> › </span><span class="bcc">'+fc+'</span></div>'+
    '<div class="sr">'+
      '<div class="sb"><div class="sbl">GTİP Kodu</div><div class="sbv code">'+fc+'</div></div>'+
      '<div class="sb"><div class="sbl">Fasıl</div><div class="sbv">'+fasil+' \u2014 '+escH(f.length>22?f.slice(0,22)+"...":f)+'</div></div>'+
      '<div class="sb"><div class="sbl">Hane</div><div class="sbv">'+(code.length===12?"12 (Tam)":"4 (Pozisyon)")+'</div></div>'+
    '</div>'+
    '<div class="sec"><div class="sl">Açıklama</div><div class="db">'+escH(desc)+'</div></div>'+
    '<div id="'+xid+'">'+ldg("Vergi ve ithalat verileri yükleniyor...")+'</div>'+
    subH+'</div>';
  document.getElementById("rp").scrollTop=0;

  if(code.length!==12){
    document.getElementById(xid).innerHTML='<div class="ib">Gümrük vergisi ve ülke verileri için 12 haneli bir alt kod seçin.</div>';
    return;
  }
  if(CACHE[code]){renderExtra(xid,CACHE[code]);return;}

  try{
    const resp=await fetch("/api/gtip",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({code:fc,desc:desc})
    });
    const info=await resp.json();
    if(info.error)throw new Error(info.error);
    CACHE[code]=info;
    renderExtra(xid,info);
  }catch(e){
    const el=document.getElementById(xid);
    if(el)el.innerHTML='<div class="er">AI verisi alınamadı: '+escH(e.message)+'</div>';
  }
}
function renderExtra(id,info){
  const el=document.getElementById(id);
  if(!el)return;
  const ul=info.ihracat_ulkeler||[];
  const ms=info.musteriler||[];
  const mx=Math.max(...ul.map(u=>u.pay||0),1);

  // İhracat ülkeleri — pay, hacim, gümrük vergisi
  const ulkeRows=ul.map((u,i)=>
    '<div class="urow">'+
    '<span class="urn">'+(i+1)+'</span>'+
    '<span class="uan">'+escH(u.ulke||"—")+'</span>'+
    '<div class="ubw"><div class="ub" style="width:'+Math.round((u.pay||0)/mx*100)+'%"></div></div>'+
    '<span class="up">%'+(u.pay||0)+'</span>'+
    '<span class="uhack">$'+(u.hacim_milyon_usd||0)+'M</span>'+
    '<span class="ugmrk">'+escH(u.turkiye_gumruk||"—")+'</span>'+
    '</div>'
  ).join("");

  // Potansiyel müşteri firmaları
  const musteriRows=ms.length?
    '<div class="sec"><div class="sl">Potansiyel Alıcı Firmalar (GTİP Bazlı)</div>'+
    '<div class="atbl">'+ms.map((m,i)=>
      '<div class="arow">'+
      '<span class="arn">'+(i+1)+'</span>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">'+
          '<span class="afu">'+escH(m.firma||"—")+'</span>'+
          '<span class="aul">'+escH(m.ulke||"")+'</span>'+
          '<span class="ask">'+escH(m.sektor||"")+'</span>'+
        '</div>'+
        (m.aciklama?'<div class="aac">'+escH(m.aciklama)+'</div>':"")+
      '</div>'+
      '</div>'
    ).join("")+'</div></div>':"";

  el.innerHTML=
    // Bölüm 1: Türkiye gümrük vergileri
    '<div class="sec"><div class="sl">Türkiye Gümrük Vergisi Ve Mali Yükümlülükler</div>'+
    '<div class="vgrid">'+
      '<div class="vcard"><div class="vcl">AB Gümrük Vergisi</div><div class="vcv g">'+escH(info.vergi_ab||"—")+'</div></div>'+
      '<div class="vcard"><div class="vcl">Diğer Ülkeler</div><div class="vcv">'+escH(info.vergi_diger||"—")+'</div></div>'+
      '<div class="vcard"><div class="vcl">KDV</div><div class="vcv">'+escH(info.kdv||"—")+'</div></div>'+
    '</div>'+
    (info.ek_vergi?'<div class="ekv">&#x26A0; '+escH(info.ek_vergi)+'</div>':"")+
    '</div>'+
    // Bölüm 2: İhracat yaptığı ülkeler + ülke gümrükleri
    '<div class="sec"><div class="sl">Türkiye'nin En Fazla İhracat Yaptığı 10 Ülke</div>'+
    '<div class="utbl-hdr">'+
      '<span style="width:18px"></span>'+
      '<span style="flex:2">Ülke</span>'+
      '<span style="flex:1">Pay</span>'+
      '<span style="width:60px;text-align:right">Hacim</span>'+
      '<span style="width:80px;text-align:right">Gümrük</span>'+
    '</div>'+
    '<div class="utbl">'+ulkeRows+'</div>'+
    '<div style="font-size:9px;color:var(--tx3);font-family:var(--mn);margin-top:6px">* Gümrük: İlgili ülkenin Türkiye menşeli ürüne uyguladığı vergi</div>'+
    '</div>'+
    // Bölüm 3: Potansiyel müşteri firmalar
    musteriRows;
}

// ── BÖLÜM/FASIL ───────────────────────────────────────────
function setTab(t){
  curTab=t;
  document.getElementById("tab-s").className=t==="s"?"tb active":"tb";
  document.getElementById("tab-h").className=t==="h"?"tb active":"tb";
  if(t==="h")renderBol();
  else{document.getElementById("lb").innerHTML='<div class="emp">GTİP kodu veya ürün adı yazın</div>';document.getElementById("si").value="";document.getElementById("sicl").className="sicl";}
}
function renderBol(){
  document.getElementById("lb").innerHTML=BOLUMLER.map(b=>
    '<div class="bi">'+
    '<div class="bh" onclick="togB(\'bol'+b.id+'\',this)"><span class="bn">'+b.id+'</span><span class="bname">'+escH(b.ad)+'</span><span class="btog">&#x25B6;</span></div>'+
    '<div class="fl" id="bol'+b.id+'">'+b.f.map(fn=>
      '<div class="fi" onclick="selFasil(\''+fn+'\')"><span class="fno">'+fn+'</span><span>'+escH(fa(fn).length>52?fa(fn).slice(0,52)+"...":fa(fn))+'</span></div>'
    ).join("")+'</div></div>'
  ).join("");
}
function togB(id,btn){
  const el=document.getElementById(id);if(!el)return;
  btn.querySelector(".btog").classList.toggle("open",el.classList.toggle("open"));
}
function selFasil(fn){
  const items=DATA.filter(r=>r[2]===fn);
  const f=fa(fn);
  const bol=BOLUMLER.find(b=>b.f.includes(fn));
  document.getElementById("sh").textContent="Fasıl "+fn+" \u2014 "+items.length+" kayıt";
  document.getElementById("lb").innerHTML=
    (items.length>120?'<div class="cnt">İlk 120 / '+items.length+'</div>':"")+
    items.slice(0,120).map(r=>riHTML(r)).join("");
  const ba=bol?"Bölüm "+bol.id+" \u2014 "+escH(bol.ad.length>40?bol.ad.slice(0,40)+"...":bol.ad):"";
  document.getElementById("rp").innerHTML=
    '<div class="det"><div class="dc">FASIL '+fn+'</div><div class="dt">'+escH(f)+'</div>'+
    '<div class="bc"><span>'+ba+'</span><span class="bcs"> › </span><span class="bcc">Fasıl '+fn+'</span></div>'+
    '<div class="sr">'+
      '<div class="sb"><div class="sbl">Fasıl No</div><div class="sbv">'+fn+'</div></div>'+
      '<div class="sb"><div class="sbl">Toplam Kayıt</div><div class="sbv">'+items.length+'</div></div>'+
      '<div class="sb"><div class="sbl">12-Haneli</div><div class="sbv">'+items.filter(r=>r[0].length===12).length+'</div></div>'+
    '</div>'+
    '<div class="sec"><div class="sl">Fasıl Açıklaması</div><div class="db">'+escH(f)+'<br><br>Bu fasılda <strong>'+items.length+'</strong> kayıt. Sol panelden bir koda tıklayın.</div></div></div>';
}

// ── YARDIMCILAR ───────────────────────────────────────────
function srchEx(q){setTab("s");document.getElementById("si").value=q;document.getElementById("sicl").className="sicl show";doSrch(q);}
function clrSrch(){document.getElementById("si").value="";document.getElementById("sicl").className="sicl";document.getElementById("lb").innerHTML='<div class="emp">GTİP kodu veya ürün adı yazın</div>';document.getElementById("sh").textContent=DATA.length.toLocaleString("tr")+" kayıt \u00b7 Ctrl+K";document.getElementById("si").focus();}

async function sendQ(){
  const q=document.getElementById("qi").value.trim();
  if(!q||busyQ)return;
  document.getElementById("qi").value="";busyQ=true;document.getElementById("qb").disabled=true;
  document.getElementById("rp").innerHTML='<div class="det"><div class="dc">AI SORGU</div><div class="dt" style="font-size:14px">'+escH(q.slice(0,80))+(q.length>80?"...":"")+'</div>'+ldg("Yanıt hazırlanıyor...")+'</div>';
  try{
    const r=await fetch("/api/query",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q})});
    const d=await r.json();if(d.error)throw new Error(d.error);if(!d.answer)throw new Error("Yanıt alınamadı");
    document.getElementById("rp").innerHTML='<div class="det"><div class="dc">AI SORGU</div><div class="dt" style="font-size:14px">'+escH(q.slice(0,80))+(q.length>80?"...":"")+'</div><div class="sec" style="margin-top:1rem"><div class="qres">'+escH(d.answer)+'</div></div></div>';
  }catch(e){document.getElementById("rp").innerHTML='<div class="det"><div class="er">Hata: '+escH(e.message)+'</div></div>';}
  finally{busyQ=false;document.getElementById("qb").disabled=false;}
}

document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setTab("s");document.getElementById("si").focus();}
  if(e.key==="Escape"&&document.activeElement===document.getElementById("si"))clrSrch();
});

loadData();
</script>
